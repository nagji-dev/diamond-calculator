<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>શિવ પેલેસ સોસાયટી</title><style>
body{
font-family:Arial;
padding:10px;
background:#f4f4f4;
}

h2{
background:#2c4b63;
color:white;
padding:12px;
text-align:center;
border-radius:6px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

input{
width:80px;
padding:4px;
}

button{
padding:10px 15px;
margin:5px;
border:none;
background:#2c4b63;
color:white;
border-radius:5px;
}

button:hover{
background:#1d3244;
}

.total{
color:green;
font-weight:bold;
}

.section{
margin-top:15px;
background:white;
padding:10px;
border-radius:6px;
}
</style></head><body><h2>શિવ પેલેસ સોસાયટી ની આવક જાવક નો હિસાબ</h2><div class="section"><h3>મેન્ટેનન્સ</h3><table>
<tr>
<th>વિગત</th>
<th>ચૂકવ્યા</th>
<th>દર</th>
<th>કુલ રૂપિયા</th>
</tr><tr>
<td>ફ્લેટ</td>
<td><input id="flatPaid"></td>
<td>700</td>
<td id="flatTotal">0</td>
</tr><tr>
<td>દુકાન</td>
<td><input id="shopPaid"></td>
<td>300</td>
<td id="shopTotal">0</td>
</tr></table></div><div class="section"><h3>આવક</h3>અગાઉનું બેલેન્સ ₹
<input id="oldBalance">

<br><br>

Transfer Fee ₹
<input id="transfer">

<br><br>

પ્રસંગ આવક ₹
<input id="event">

<br><br>

<h3>કુલ મેન્ટેનન્સ ₹ <span id="maintenanceTotal">0</span></h3><h3>કુલ આવક ₹ <span id="incomeTotal">0</span></h3></div><div class="section"><h3>જાવક</h3><table><tr>
<th>તારીખ</th>
<th>વિગત</th>
<th>રૂપીયા</th>
</tr><tr><td><input></td><td><input></td><td><input class="exp"></td></tr>
<tr><td><input></td><td><input></td><td><input class="exp"></td></tr>
<tr><td><input></td><td><input></td><td><input class="exp"></td></tr>
<tr><td><input></td><td><input></td><td><input class="exp"></td></tr>
<tr><td><input></td><td><input></td><td><input class="exp"></td></tr>
<tr><td><input></td><td><input></td><td><input class="exp"></td></tr>
<tr><td><input></td><td><input></td><td><input class="exp"></td></tr>
<tr><td><input></td><td><input></td><td><input class="exp"></td></tr>
<tr><td><input></td><td><input></td><td><input class="exp"></td></tr>
<tr><td><input></td><td><input></td><td><input class="exp"></td></tr>
<tr><td><input></td><td><input></td><td><input class="exp"></td></tr>
<tr><td><input></td><td><input></td><td><input class="exp"></td></tr></table><h3>કુલ જાવક ₹ <span id="expenseTotal">0</span></h3></div><div class="section"><h2>ફાઈનલ બેલેન્સ ₹ <span id="balance">0</span></h2><h3>આગળ ની બેલેન્સ ₹ <span id="nextBalance">0</span></h3></div><div style="text-align:center"><button onclick="calc()">કેલ્ક્યુલેટ</button>

<button onclick="clearAll()">ક્લિયર</button>

<button onclick="window.print()">PDF</button>

</div><script>

function calc(){

let flatPaid=Number(document.getElementById("flatPaid").value);
let shopPaid=Number(document.getElementById("shopPaid").value);

let flatTotal=flatPaid*700;
let shopTotal=shopPaid*300;

document.getElementById("flatTotal").innerText=flatTotal;
document.getElementById("shopTotal").innerText=shopTotal;

let maintenance=flatTotal+shopTotal;

document.getElementById("maintenanceTotal").innerText=maintenance;

let old=Number(document.getElementById("oldBalance").value);
let transfer=Number(document.getElementById("transfer").value);
let event=Number(document.getElementById("event").value);

let income=maintenance+old+transfer+event;

document.getElementById("incomeTotal").innerText=income;

let exp=document.querySelectorAll(".exp");
let totalExp=0;

for(let i=0;i<exp.length;i++){
totalExp+=Number(exp[i].value);
}

document.getElementById("expenseTotal").innerText=totalExp;

let balance=income-totalExp;

document.getElementById("balance").innerText=balance;
document.getElementById("nextBalance").innerText=balance;

}

function clearAll(){

let inputs=document.querySelectorAll("input");

for(let i=0;i<inputs.length;i++){
inputs[i].value="";
}

document.getElementById("flatTotal").innerText=0;
document.getElementById("shopTotal").innerText=0;
document.getElementById("maintenanceTotal").innerText=0;
document.getElementById("incomeTotal").innerText=0;
document.getElementById("expenseTotal").innerText=0;
document.getElementById("balance").innerText=0;
document.getElementById("nextBalance").innerText=0;

}

</script></body>
</html>
