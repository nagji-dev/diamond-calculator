<!DOCTYPE html>
<html>
<head>

<title>Shiv Palace Society</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#ecf0f1;
}

.header{
background:#2c3e50;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.menu{
display:flex;
justify-content:space-around;
background:#34495e;
padding:10px;
}

.menu button{
background:#3498db;
border:none;
color:white;
padding:10px 15px;
font-size:16px;
border-radius:6px;
}

.menu button:hover{
background:#2980b9;
}

iframe{
width:100%;
height:90vh;
border:none;
}

.footer{
text-align:center;
padding:5px;
font-size:12px;
background:#bdc3c7;
}

</style>

<script>

function maintenance(){
document.getElementById("frame").src="https://docs.google.com/spreadsheets/d/19qZP2-JKbczknAFb3L8k5OOw-bbsuH-QDB5U4JTV3QE/preview";
}

function expense(){
document.getElementById("frame").src="https://docs.google.com/spreadsheets/d/19qZP2-JKbczknAFb3L8k5OOw-bbsuH-QDB5U4JTV3QE/edit#gid=0";
}

function report(){
document.getElementById("frame").src="https://docs.google.com/spreadsheets/d/19qZP2-JKbczknAFb3L8k5OOw-bbsuH-QDB5U4JTV3QE";
}

</script>

</head>

<body>

<div class="header">
🏢 Shiv Palace Society Management
</div>

<div class="menu">

<button onclick="maintenance()">Maintenance</button>

<button onclick="expense()">Expense</button>

<button onclick="report()">Report</button>

</div>

<iframe id="frame"
src="https://docs.google.com/spreadsheets/d/19qZP2-JKbczknAFb3L8k5OOw-bbsuH-QDB5U4JTV3QE/preview">
</iframe>

<div class="footer">
Shiv Palace Society Account System
</div>

</body>
</html>
