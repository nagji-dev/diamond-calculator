<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Society Management</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
}

h2{
background:#2c3e50;
color:white;
padding:10px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

input{
width:60px;
font-size:16px;
text-align:center;
}

button{
padding:10px 20px;
margin:10px;
font-size:16px;
background:#3498db;
color:white;
border:none;
border-radius:5px;
}

.total{
font-weight:bold;
color:green;
}

</style>
</head>

<body>

<h2>Shiv Palace Society Account</h2>

<table id="societyTable">
<tr>
<th>No</th>
<th>Flat</th>
<th>Rate</th>
<th>Month</th>
<th>Total</th>
</tr>

<tbody></tbody>

</table>

<h3>Total Collection ₹ <span id="grandTotal">0</span></h3>

<button onclick="downloadPDF()">Download PDF</button>

<script>

let flats=[
"A-1","A-2","A-3","A-4","A-5",
"B-1","B-2","B-3","B-4","B-5","B-6",
"C","D","Shop"
];

let tbody=document.querySelector("tbody");

flats.forEach((flat,i)=>{

let row=document.createElement("tr");

row.innerHTML=`
<td>${i+1}</td>
<td>${flat}</td>
<td><input type="number" class="rate"></td>
<td><input type="number" class="month"></td>
<td class="total">0</td>
`;

tbody.appendChild(row);

});

function calculate(){

let rows=document.querySelectorAll("tbody tr");
let grand=0;

rows.forEach((row,i)=>{

let rate=row.querySelector(".rate").value || 0;
let month=row.querySelector(".month").value || 0;

let total=rate*month;

row.querySelector(".total").innerText=total;

grand+=total;

});

document.getElementById("grandTotal").innerText=grand;

saveData();

}

document.addEventListener("input",calculate);

function saveData(){

let data=[];

document.querySelectorAll("tbody tr").forEach(row=>{

data.push({
rate:row.querySelector(".rate").value,
month:row.querySelector(".month").value
});

});

localStorage.setItem("societyData",JSON.stringify(data));

}

function loadData(){

let data=JSON.parse(localStorage.getItem("societyData"));

if(!data) return;

document.querySelectorAll("tbody tr").forEach((row,i)=>{

row.querySelector(".rate").value=data[i].rate;
row.querySelector(".month").value=data[i].month;

});

calculate();

}

function downloadPDF(){

window.print();

}

loadData();

</script>

</body>
</html>
