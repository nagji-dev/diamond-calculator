<button onclick="calculate()">Calculate Total</button>

<div class="total">
Total Maintenance ₹ <span id="total">0</span>
</div>

<script>

function calculate(){

let paid=document.querySelectorAll(".paid");
let amount=document.querySelectorAll(".amount");

let total=0;

for(let i=0;i<paid.length;i++){

let m=paid[i].value;

let money=m*700;

amount[i].innerText=money;

total+=money;

}

document.getElementById("total").innerText=total;

}

</script>
