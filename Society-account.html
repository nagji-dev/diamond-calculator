<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Society Management</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:10px;
}

h2{
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
background:white;
margin-bottom:20px;
}

th,td{
border:1px solid #999;
padding:6px;
text-align:center;
}

th{
background:#4CAF50;
color:white;
}

input{
width:100%;
border:none;
text-align:center;
}

.total{
background:#ffe0e0;
font-weight:bold;
}

</style>
</head>

<body>

<h2>Society Income (Sheet1)</h2>

<table id="income">

<tr>
<th>ક્રમ</th>
<th>બિલ્ડિંગ</th>
<th>ટોટલ ફ્લેટ</th>
<th>મેન્ટેનન્સ ફ્લેટ</th>
<th>ટોટલ રૂપિયા</th>
</tr>

<tr>
<td>1</td>
<td>A-1</td>
<td>20</td>
<td><input type="number" class="flat"></td>
<td class="amount">0</td>
</tr>

<tr>
<td>2</td>
<td>A-2</td>
<td>20</td>
<td><input type="number" class="flat"></td>
<td class="amount">0</td>
</tr>

<tr>
<td>3</td>
<td>A-3</td>
<td>20</td>
<td><input type="number" class="flat"></td>
<td class="amount">0</td>
</tr>

</table>

<h3>Total Income : ₹ <span id="incomeTotal">0</span></h3>


<h2>Expense (Sheet2)</h2>

<table id="expense">

<tr>
<th>ક્રમ</th>
<th>રૂપિયા</th>
<th>ખર્ચ વિગત</th>
</tr>

<tr>
<td>1</td>
<td><input type="number" class="exp"></td>
<td><input type="text"></td>
</tr>

<tr>
<td>2</td>
<td><input type="number" class="exp"></td>
<td><input type="text"></td>
</tr>

</table>

<h3>Total Expense : ₹ <span id="expenseTotal">0</span></h3>


<h2>Balance</h2>

<table>

<tr>
<td>આગલા બેલેન્સ</td>
<td><input type="number" id="oldBalance" value="392675"></td>
</tr>

<tr>
<td>હાલ ની આવક</td>
<td id="incomeShow">0</td>
</tr>

<tr>
<td>કુલ રકમ</td>
<td id="grandTotal">0</td>
</tr>

<tr>
<td>ખર્ચ</td>
<td id="expenseShow">0</td>
</tr>

<tr class="total">
<td>હાલ ની બેલેન્સ</td>
<td id="finalBalance">0</td>
</tr>

</table>

<script>

let rate=700

function calculate(){

let flats=document.querySelectorAll(".flat")
let amounts=document.querySelectorAll(".amount")

let incomeTotal=0

flats.forEach((f,i)=>{

let val=f.value*rate
amounts[i].innerText=val
incomeTotal+=val

})

document.getElementById("incomeTotal").innerText=incomeTotal
document.getElementById("incomeShow").innerText=incomeTotal


let exp=document.querySelectorAll(".exp")

let expenseTotal=0

exp.forEach(e=>{
expenseTotal+=Number(e.value)
})

document.getElementById("expenseTotal").innerText=expenseTotal
document.getElementById("expenseShow").innerText=expenseTotal


let old=Number(document.getElementById("oldBalance").value)

let grand=old+incomeTotal

document.getElementById("grandTotal").innerText=grand

document.getElementById("finalBalance").innerText=grand-expenseTotal

}

document.addEventListener("input",calculate)

</script>

</body>
</html>
