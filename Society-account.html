<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Society Management</title>

<style>
body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

h2{
background:#2c3e50;
color:white;
padding:10px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

input{
width:60px;
text-align:center;
font-size:16px;
}

.total{
font-weight:bold;
color:green;
}

button{
padding:10px 20px;
margin:10px;
font-size:16px;
}
</style>
</head>

<body>

<h2>Shiv Palace Society Management</h2>

<table>
<tr>
<th>No</th>
<th>Flat</th>
<th>Rate</th>
<th>Month</th>
<th>Total</th>
</tr>

<tbody id="tableBody"></tbody>

</table>

<h3>Total Collection: ₹ <span id="grandTotal">0</span></h3>

<script>

let flats = [
"A-1","A-2","A-3","A-4","A-5",
"B-1","B-2","B-3","B-4","B-5","B-6",
"C","D","Shop"
];

let body = document.getElementById("tableBody");

flats.forEach((flat,i)=>{

let row = document.createElement("tr");

row.innerHTML=`
<td>${i+1}</td>
<td>${flat}</td>
<td><input type="number" value="700" oninput="calc()"></td>
<td><input type="number" value="1" oninput="calc()"></td>
<td class="total">0</td>
`;

body.appendChild(row);

});

function calc(){

let rows=document.querySelectorAll("#tableBody tr");
let grand=0;

rows.forEach(r=>{

let rate=r.children[2].children[0].value;
let month=r.children[3].children[0].value;

let total=rate*month;

r.children[4].innerText=total;

grand+=total;

});

document.getElementById("grandTotal").innerText=grand;

}

calc();

</script>

</body>
</html>
