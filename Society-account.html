<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Society Account</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:10px;
}

h2{
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
background:white;
margin-top:10px;
}

th,td{
border:1px solid black;
padding:6px;
text-align:center;
}

input{
width:90%;
border:none;
text-align:center;
}

.total{
background:#ddd;
font-weight:bold;
}

button{
width:100%;
padding:12px;
background:#2e7d32;
color:white;
border:none;
font-size:16px;
margin-top:10px;
}

</style>

</head>

<body>

<h2>Society Income</h2>

<table>

<tr>
<th>Building</th>
<th>Month</th>
<th>Amount</th>
</tr>

<tr><td>A1</td><td><input></td><td><input class="income"></td></tr>
<tr><td>A2</td><td><input></td><td><input class="income"></td></tr>
<tr><td>A3</td><td><input></td><td><input class="income"></td></tr>
<tr><td>A4</td><td><input></td><td><input class="income"></td></tr>
<tr><td>A5</td><td><input></td><td><input class="income"></td></tr>

<tr><td>B1</td><td><input></td><td><input class="income"></td></tr>
<tr><td>B2</td><td><input></td><td><input class="income"></td></tr>
<tr><td>B3</td><td><input></td><td><input class="income"></td></tr>
<tr><td>B4</td><td><input></td><td><input class="income"></td></tr>
<tr><td>B5</td><td><input></td><td><input class="income"></td></tr>
<tr><td>B6</td><td><input></td><td><input class="income"></td></tr>

<tr><td>C</td><td><input></td><td><input class="income"></td></tr>
<tr><td>D</td><td><input></td><td><input class="income"></td></tr>

<tr><td>Shopping</td><td><input></td><td><input class="income"></td></tr>

</table>


<h2>Other Income</h2>

<table>

<tr>
<th>Type</th>
<th>Amount</th>
<th>Remark</th>
</tr>

<tr>
<td>Transfer Fee</td>
<td><input class="income"></td>
<td><input></td>
</tr>

<tr>
<td>Penalty</td>
<td><input class="income"></td>
<td><input></td>
</tr>

</table>


<h2>Expense</h2>

<table>

<tr>
<th>No</th>
<th>Amount</th>
<th>Detail</th>
<th>Date</th>
</tr>

<tr><td>1</td><td><input class="expense"></td><td><input></td><td><input type="date"></td></tr>
<tr><td>2</td><td><input class="expense"></td><td><input></td><td><input type="date"></td></tr>
<tr><td>3</td><td><input class="expense"></td><td><input></td><td><input type="date"></td></tr>
<tr><td>4</td><td><input class="expense"></td><td><input></td><td><input type="date"></td></tr>

</table>


<h2>Summary</h2>

<table>

<tr>
<th>Previous Balance</th>
<th><input id="prev"></th>
</tr>

<tr>
<th>Total Income</th>
<th id="incomeTotal">0</th>
</tr>

<tr>
<th>Total Expense</th>
<th id="expenseTotal">0</th>
</tr>

<tr class="total">
<th>Final Balance</th>
<th id="balance">0</th>
</tr>

</table>

<button onclick="calculate()">Calculate</button>

<button onclick="window.print()">Download PDF</button>

<script>

function calculate(){

let income=0

document.querySelectorAll(".income").forEach(i=>{
income+=Number(i.value)
})

let expense=0

document.querySelectorAll(".expense").forEach(i=>{
expense+=Number(i.value)
})

let prev=Number(document.getElementById("prev").value)

document.getElementById("incomeTotal").innerText=income

document.getElementById("expenseTotal").innerText=expense

document.getElementById("balance").innerText=prev+income-expense

}

</script>

</body>
</html>
