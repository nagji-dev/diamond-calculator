<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shiv Palace Society Account</title>

<style>
body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

h2{
background:#2c3e50;
color:white;
padding:10px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #999;
padding:6px;
text-align:center;
}

input{
width:70px;
font-size:16px;
text-align:center;
}

.total{
color:green;
font-weight:bold;
}

button{
padding:10px 20px;
margin:10px;
background:#3498db;
color:white;
border:none;
border-radius:5px;
}

</style>
</head>

<body>

<h2>શિવ પેલેસ મેનેજમેન્ટ એકાઉન્ટ</h2>

<table id="maintable">

<tr>
<th>ક્રમ</th>
<th>બિલ્ડિંગ</th>
<th>કુલ ફ્લેટ</th>
<th>ચૂકવ્યા</th>
<th>બાકી</th>
<th>મેન્ટેનન્સ</th>
<th>કુલ રૂપિયા</th>
</tr>

<tbody></tbody>

</table>

<br>

Transfer Fee ₹ <input type="number" id="transfer" value="0">

<br><br>

પ્રસંગ આવક ₹ <input type="number" id="event" value="0">

<h3>કુલ મેન્ટેનન્સ ₹ <span id="maintotal">0</span></h3>

<h3>કુલ આવક ₹ <span id="grandtotal">0</span></h3>

<button onclick="window.print()">PDF બનાવો</button>

<script>

let flats=[
"A-1","A-2","A-3","A-4","A-5",
"B-1","B-2","B-3","B-4","B-5","B-6",
"C","D","Shop"
];

let tbody=document.querySelector("tbody");

flats.forEach((f,i)=>{

let row=document.createElement("tr");

row.innerHTML=`

<td>${i+1}</td>
<td>${f}</td>
<td><input type="number" class="flat" value="20"></td>
<td><input type="number" class="paid" value="0"></td>
<td class="pending">0</td>
<td><input type="number" class="rate" value="700"></td>
<td class="total">0</td>

`;

tbody.appendChild(row);

});

function calc(){

let maintotal=0;

document.querySelectorAll("#maintable tbody tr").forEach(r=>{

let flat=r.querySelector(".flat").value||0;
let paid=r.querySelector(".paid").value||0;
let rate=r.querySelector(".rate").value||0;

let pending=flat-paid;

r.querySelector(".pending").innerText=pending;

let total=paid*rate;

r.querySelector(".total").innerText=total;

maintotal+=total;

});

document.getElementById("maintotal").innerText=maintotal;

let transfer=Number(document.getElementById("transfer").value||0);
let event=Number(document.getElementById("event").value||0);

document.getElementById("grandtotal").innerText=maintotal+transfer+event;

}

document.addEventListener("input",calc);

calc();

</script>

</body>
</html>
