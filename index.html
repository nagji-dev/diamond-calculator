<!DOCTYPE html>
<html>
<head>

<title>Diamond Calculator</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/190/190411.png">

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
margin:0;
padding:10px;
}

.box{
background:white;
width:95%;
max-width:420px;
margin:auto;
margin-top:20px;
padding:20px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.logo{
width:70px;
margin-bottom:5px;
}

h2{
margin-top:5px;
}

input,select,button{
width:100%;
padding:14px;
margin-top:12px;
font-size:18px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#1976d2;
color:white;
border:none;
}

.result{
margin-top:15px;
font-size:20px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="box">

<img class="logo" src="https://cdn-icons-png.flaticon.com/512/190/190411.png">

<h2>Diamond Calculator</h2>

<select id="shape" onchange="shapeChange()">

<option value="round">Round</option>
<option value="oval">Oval</option>
<option value="pear">Pear</option>
<option value="marquise">Marquise</option>
<option value="cushion">Cushion</option>
<option value="emerald">Emerald</option>
<option value="princess">Princess</option>

</select>

<input type="number" id="length" placeholder="Length">

<input type="number" id="width" placeholder="Width / Diameter">

<input type="number" id="depth" placeholder="Depth %">

<button onclick="calculate()">Calculate</button>

<div class="result" id="weight"></div>
<div class="result" id="ratio"></div>
<div class="result" id="cut"></div>

</div>

<script>

function shapeChange(){

let shape=document.getElementById("shape").value;

let lengthBox=document.getElementById("length");

if(shape=="round"){
lengthBox.style.display="none";
}else{
lengthBox.style.display="block";
}

}

function calculate(){

let shape=document.getElementById("shape").value;

let L=parseFloat(document.getElementById("length").value);

let W=parseFloat(document.getElementById("width").value);

let D=parseFloat(document.getElementById("depth").value);

let depth=(D/100)*W;

let constant=0;

if(shape=="round") constant=0.0061;
if(shape=="oval") constant=0.0066;
if(shape=="pear") constant=0.0064;
if(shape=="marquise") constant=0.0059;
if(shape=="cushion") constant=0.0061;
if(shape=="emerald") constant=0.0065;
if(shape=="princess") constant=0.0061;

let weight;

if(shape=="round"){
weight=W*W*depth*constant;
}else{
weight=L*W*depth*constant;
}

let ratio;

if(shape=="round"){
ratio="1.00";
}else{
ratio=(L/W).toFixed(2);
}

let cut="";

if(D>=59 && D<=62){
cut="EXCELLENT";
}
else if(D>=57 && D<=64){
cut="VERY GOOD";
}
else if(D>=55 && D<=66){
cut="GOOD";
}
else{
cut="FAIR";
}

document.getElementById("weight").innerHTML="Weight : "+weight.toFixed(2)+" ct";

document.getElementById("ratio").innerHTML="Ratio : "+ratio;

document.getElementById("cut").innerHTML="Cut : "+cut;

}

shapeChange();

</script>

</body>
</html>
