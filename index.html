
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diamond Weight Calculator (Pro)</title>

<style>
body{
font-family: Arial;
background:#f2f2f2;
margin:0;
padding:20px;
}

.container{
background:white;
padding:20px;
border-radius:12px;
max-width:400px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
}

select,input{
width:100%;
padding:12px;
margin:8px 0;
font-size:16px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:14px;
background:green;
color:white;
font-size:18px;
border:none;
border-radius:8px;
margin-top:10px;
}

.result{
margin-top:15px;
font-size:20px;
font-weight:bold;
text-align:center;
}
</style>
</head>

<body>

<div class="container">
<h2>Diamond Weight Calculator (Pro)</h2>

<select id="shape">
<option value="Round">Round Cut</option>
<option value="Oval">Oval</option>
<option value="Pear">Pear</option>
<option value="Marquise">Marquise</option>
<option value="Princess">Princess</option>
<option value="Cushion">Cushion</option>
<option value="Emerald">Emerald</option>
<option value="Radiant">Radiant</option>
<option value="Heart">Heart</option>
</select>

<select id="lab" onchange="updateCut()">
<option value="GIA">GIA</option>
<option value="IGI">IGI</option>
</select>

<select id="cutType">
<option>Excellent</option>
<option>Very Good</option>
<option>Good</option>
</select>

<input type="number" id="length" placeholder="Length / Diameter (mm)">
<input type="number" id="width" placeholder="Width (mm)">
<input type="number" id="depth" placeholder="Total Depth %">

<button onclick="calculate()">Calculate Weight</button>

<div class="result" id="result">Weight: 0.00 ct</div>

</div>

<script>

function updateCut(){
var lab=document.getElementById("lab").value;
var cut=document.getElementById("cutType");
cut.innerHTML="";

if(lab=="GIA"){
cut.innerHTML+="<option>Excellent</option>";
cut.innerHTML+="<option>Very Good</option>";
cut.innerHTML+="<option>Good</option>";
}else{
cut.innerHTML+="<option>Ideal</option>";
cut.innerHTML+="<option>Very Good</option>";
cut.innerHTML+="<option>Good</option>";
}
}

function calculate(){

var shape=document.getElementById("shape").value;
var length=parseFloat(document.getElementById("length").value);
var width=parseFloat(document.getElementById("width").value);
var depth=parseFloat(document.getElementById("depth").value);

if(!length || !depth){
alert("Please enter proper values");
return;
}

if(shape=="Round"){
width=length;
}

var depthMM=(depth/100)*((length+width)/2);

var weight=0;

if(shape=="Round"){
weight=length*length*depthMM*0.0061;
}else{
weight=length*width*depthMM*0.0061;
}

document.getElementById("result").innerHTML=
"Weight: "+weight.toFixed(2)+" ct";

}

</script>

</body>
</html>
