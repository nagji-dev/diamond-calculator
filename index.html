<!DOCTYPE html>
<html>
<head>

<title>Diamond Calculator Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#eef2f6;
margin:0;
padding:20px;
}

.card{
background:white;
max-width:430px;
margin:auto;
padding:22px;
border-radius:14px;
box-shadow:0 8px 25px rgba(0,0,0,0.15);
}

h1{
text-align:center;
font-size:22px;
margin-bottom:10px;
}

.section{
margin-top:15px;
padding-top:10px;
border-top:1px solid #ddd;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:12px;
}

label{
font-weight:bold;
font-size:14px;
}

input,select{
width:170px;
padding:10px;
border-radius:7px;
border:1px solid #ccc;
font-size:15px;
}

button{
width:100%;
margin-top:20px;
padding:14px;
border:none;
border-radius:8px;
background:#1976d2;
color:white;
font-size:18px;
}

.result{
margin-top:14px;
font-size:18px;
font-weight:bold;
text-align:center;
}

.small{
font-size:14px;
color:#555;
text-align:center;
}

</style>
</head>

<body>

<div class="card">

<h1>💎 Diamond Calculator</h1>

<div class="section">

<div class="row">
<label>Shape</label>
<select id="shape">
<option value="round">Round</option>
<option value="oval">Oval</option>
<option value="pear">Pear</option>
<option value="marquise">Marquise</option>
<option value="cushion">Cushion</option>
<option value="emerald">Emerald</option>
<option value="princess">Princess</option>
</select>
</div>

<div class="row">
<label>Mode</label>
<select id="mode" onchange="modeChange()">
<option value="normal">Depth %</option>
<option value="helium">Helium Height</option>
</select>
</div>

<div class="row">
<label>Length / Dia1</label>
<input type="number" id="l">
</div>

<div class="row">
<label>Width / Dia2</label>
<input type="number" id="w">
</div>

<div class="row" id="depthRow">
<label>Total Depth %</label>
<input type="number" id="depth">
</div>

<div class="row" id="heightRow" style="display:none;">
<label>Height (mm)</label>
<input type="number" id="height">
</div>

</div>

<button onclick="calculate()">Calculate</button>

<div class="section">

<div class="result" id="weight"></div>
<div class="result" id="ratio"></div>
<div class="small">Sarin Planning Formula</div>

</div>

</div>

<script>

function modeChange(){

let mode=document.getElementById("mode").value;

if(mode=="helium"){
document.getElementById("depthRow").style.display="none";
document.getElementById("heightRow").style.display="flex";
}
else{
document.getElementById("depthRow").style.display="flex";
document.getElementById("heightRow").style.display="none";
}

}

function calculate(){

let shape=document.getElementById("shape").value;

let L=parseFloat(document.getElementById("l").value);
let W=parseFloat(document.getElementById("w").value);

let avg=(L+W)/2;

let height;

if(document.getElementById("mode").value=="helium"){

height=parseFloat(document.getElementById("height").value);

}else{

let depth=parseFloat(document.getElementById("depth").value);

if(shape=="round"){
height=avg*(depth/100);
}else{
height=W*(depth/100);
}

}

let constant=0;

if(shape=="round") constant=0.00614;
if(shape=="oval") constant=0.00627;
if(shape=="pear") constant=0.00605;
if(shape=="marquise") constant=0.0057;
if(shape=="cushion") constant=0.0061;
if(shape=="emerald") constant=0.0063;
if(shape=="princess") constant=0.0061;

let weight;

if(shape=="round"){
weight=avg*avg*height*constant;
}else{
weight=L*W*height*constant;
}

let ratio=(L/W).toFixed(2);

document.getElementById("weight").innerHTML="Weight : "+weight.toFixed(2)+" ct";
document.getElementById("ratio").innerHTML="Ratio : "+ratio;

}

</script>

</body>
</html>
