<!DOCTYPE html>
<html>
<head>
<title>Round Diamond Calculator</title>
<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:20px;
}

.box{
background:white;
padding:25px;
max-width:400px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px #ccc;
}

input{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:15px;
font-size:16px;
}

button{
width:100%;
padding:12px;
font-size:18px;
background:#0a8f2a;
color:white;
border:none;
border-radius:6px;
}

.result{
margin-top:20px;
font-size:22px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="box">

<h2>Round Diamond Calculator</h2>

<label>Diameter (mm)</label>
<input id="diameter" type="number" step="0.01">

<label>Total Depth %</label>
<input id="depth" type="number" step="0.1">

<button onclick="calc()">Calculate</button>

<div class="result" id="result"></div>

</div>

<script>

function calc(){

let d = parseFloat(document.getElementById("diameter").value);
let depthPercent = parseFloat(document.getElementById("depth").value);

if(!d || !depthPercent){
alert("Value enter karo");
return;
}

// depth mm
let depthMM = d * depthPercent / 100;

// points
let points = (d*d*(depthMM*100))/164;

// carat
let carat = points/100;

document.getElementById("result").innerHTML =
"Weight : " + carat.toFixed(2) + " ct";

}

</script>

</body>
</html>
