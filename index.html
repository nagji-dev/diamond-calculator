<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diamond Calculator</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:20px;
}

.box{
background:white;
padding:20px;
border-radius:10px;
max-width:420px;
margin:auto;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#007bff;
color:white;
border:none;
border-radius:6px;
}

.result{
margin-top:20px;
font-size:18px;
}

</style>
</head>

<body>

<div class="box">

<h2>Diamond Calculator</h2>

<h3>Round Diamond</h3>

<input id="diameter" placeholder="Diameter mm">
<input id="depth" placeholder="Total Depth %">
<input id="table" placeholder="Table %">
<input id="crown" placeholder="Crown Angle">
<input id="pavilion" placeholder="Pavilion Angle">

<button onclick="roundCalc()">Calculate Round</button>

<hr>

<h3>Fancy Shape</h3>

<select id="shape">

<option value="0.0061">Oval</option>
<option value="0.0061">Cushion</option>
<option value="0.0061">Radiant</option>
<option value="0.0061">Princess</option>
<option value="0.0059">Emerald</option>
<option value="0.0057">Pear</option>
<option value="0.0057">Marquise</option>
<option value="0.0059">Heart</option>

</select>

<input id="length" placeholder="Length mm">
<input id="width" placeholder="Width mm">
<input id="fdepth" placeholder="Total Depth %">

<button onclick="fancyCalc()">Calculate Fancy</button>

<div class="result">

<p id="weight"></p>
<p id="gia"></p>
<p id="igi"></p>

</div>

</div>

<script>

function roundCalc(){

let d=parseFloat(document.getElementById("diameter").value);
let depth=parseFloat(document.getElementById("depth").value);
let table=parseFloat(document.getElementById("table").value);
let crown=parseFloat(document.getElementById("crown").value);
let pavilion=parseFloat(document.getElementById("pavilion").value);

let weight=(d*d*depth*0.0061).toFixed(2);

document.getElementById("weight").innerText="Weight : "+weight+" ct";

document.getElementById("igi").innerText="IGI Cut : "+igi(table,depth,crown,pavilion);
document.getElementById("gia").innerText="GIA Cut : "+gia(table,crown,pavilion);

}

function fancyCalc(){

let L=parseFloat(document.getElementById("length").value);
let W=parseFloat(document.getElementById("width").value);
let depth=parseFloat(document.getElementById("fdepth").value);
let k=parseFloat(document.getElementById("shape").value);

let weight=(L*W*depth*k).toFixed(2);

document.getElementById("weight").innerText="Weight : "+weight+" ct";

document.getElementById("gia").innerText="";
document.getElementById("igi").innerText="";

}

function igi(table,depth,crown,pavilion){

if(
table>=53 && table<=59.5 &&
depth>=58.5 && depth<=62.5 &&
crown>=33 && crown<=36 &&
pavilion>=40 && pavilion<=41.3
){
return "IDEAL";
}

if(
table>=52 && table<=63 &&
depth>=58 && depth<=63.5 &&
crown>=31.5 && crown<=36.5 &&
pavilion>=40 && pavilion<=41.7
){
return "EXCELLENT";
}

return "VERY GOOD";

}

function gia(table,crown,pavilion){

if(
table>=53 && table<=58 &&
crown>=34 && crown<=35 &&
pavilion>=40.6 && pavilion<=41
){
return "EXCELLENT";
}

if(
table>=52 && table<=60 &&
crown>=33 && crown<=36 &&
pavilion>=40.4 && pavilion<=41.2
){
return "VERY GOOD";
}

return "GOOD";

}

</script>

</body>
</html>￼Enter
