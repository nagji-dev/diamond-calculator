<!DOCTYPE html>
<html>
<head>

<title>Diamond Calculator Pro</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/190/190411.png">

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
padding:15px;
}

.box{
background:white;
max-width:430px;
margin:auto;
padding:20px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.logo{
width:70px;
display:block;
margin:auto;
}

h2{
text-align:center;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:12px;
}

input,select{
width:160px;
padding:10px;
font-size:16px;
}

button{
width:100%;
padding:14px;
margin-top:16px;
font-size:18px;
background:#1976d2;
color:white;
border:none;
border-radius:6px;
}

.result{
margin-top:12px;
font-size:19px;
font-weight:bold;
text-align:center;
}

.panel{
margin-top:15px;
padding:10px;
border-top:1px solid #ddd;
display:none;
}

</style>
</head>

<body>

<div class="box">

<img class="logo" src="https://cdn-icons-png.flaticon.com/512/190/190411.png">

<h2>Diamond Calculator</h2>

<div class="row">
<label>Shape</label>
<select id="shape">
<option value="round">Round</option>
<option value="oval">Oval</option>
<option value="pear">Pear</option>
<option value="marquise">Marquise</option>
<option value="cushion">Cushion</option>
<option value="emerald">Emerald</option>
<option value="princess">Princess</option>
</select>
</div>

<div class="row">
<label>Mode</label>
<select id="mode" onchange="modeChange()">
<option value="normal">Normal</option>
<option value="helium">Helium</option>
</select>
</div>

<div class="row">
<label>Length / Diameter</label>
<input type="number" id="d1">
</div>

<div class="row">
<label>Width</label>
<input type="number" id="d2">
</div>

<div class="row" id="depthRow">
<label>Total Depth %</label>
<input type="number" id="depth">
</div>

<div class="row" id="heightRow" style="display:none;">
<label>Height (mm)</label>
<input type="number" id="height">
</div>

<button onclick="calculate()">Calculate</button>

<div class="result" id="weight"></div>
<div class="result" id="ratio"></div>

<button onclick="toggleCalibration()">⚙ Calibration</button>

<div class="panel" id="calibrationPanel">

<div class="row">
<label>Helium Weight</label>
<input type="number" id="heliumWeight">
</div>

<button onclick="calibrate()">Calibrate</button>

</div>

</div>

<script>

function modeChange(){

let mode=document.getElementById("mode").value;

if(mode=="helium"){
document.getElementById("depthRow").style.display="none";
document.getElementById("heightRow").style.display="flex";
}
else{
document.getElementById("depthRow").style.display="flex";
document.getElementById("heightRow").style.display="none";
}

}

function toggleCalibration(){

let panel=document.getElementById("calibrationPanel");

if(panel.style.display=="none"){
panel.style.display="block";
}else{
panel.style.display="none";
}

}

function calculate(){

let shape=document.getElementById("shape").value;

let L=parseFloat(document.getElementById("d1").value);
let W=parseFloat(document.getElementById("d2").value);

let avg=(L+W)/2;

let height;

if(document.getElementById("mode").value=="helium"){

height=parseFloat(document.getElementById("height").value);

}else{

let depthPercent=parseFloat(document.getElementById("depth").value);

if(shape=="round"){
height=avg*(depthPercent/100);
}else{
height=W*(depthPercent/100);
}

}

let constant=localStorage.getItem("diamondConstant");

if(!constant){

if(shape=="round") constant=0.00615;
if(shape=="oval") constant=0.00625;
if(shape=="pear") constant=0.00605;
if(shape=="marquise") constant=0.0057;
if(shape=="cushion") constant=0.0061;
if(shape=="emerald") constant=0.0063;
if(shape=="princess") constant=0.0061;

}

let weight;

if(shape=="round"){
weight=avg*avg*height*constant;
}else{
weight=L*W*height*constant;
}

let ratio=(L/W).toFixed(2);

document.getElementById("weight").innerHTML="Weight : "+weight.toFixed(2)+" ct";

document.getElementById("ratio").innerHTML="Ratio : "+ratio;

}

function calibrate(){

let L=parseFloat(document.getElementById("d1").value);
let W=parseFloat(document.getElementById("d2").value);
let H=parseFloat(document.getElementById("height").value);
let heliumWeight=parseFloat(document.getElementById("heliumWeight").value);

let constant=heliumWeight/(L*W*H);

localStorage.setItem("diamondConstant",constant);

alert("Calibration Saved : "+constant.toFixed(6));

}

</script>

</body>
</html>
