<!DOCTYPE html>
<html>
<head>

<title>Diamond Calculator</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:20px;
}

.box{
background:white;
padding:25px;
max-width:420px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px #ccc;
}

h2{
text-align:center;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:15px;
font-size:16px;
}

button{
width:100%;
padding:12px;
font-size:18px;
background:#0a8f2a;
color:white;
border:none;
border-radius:6px;
}

.result{
margin-top:20px;
font-size:20px;
font-weight:bold;
line-height:1.6;
}

</style>

</head>

<body>

<div class="box">

<h2>💎 Diamond Calculator</h2>

<label>Shape</label>

<select id="shape">
<option value="round">Round</option>
<option value="oval">Oval</option>
<option value="cushion">Cushion</option>
<option value="emerald">Emerald</option>
<option value="princess">Princess</option>
<option value="pear">Pear</option>
<option value="marquise">Marquise</option>
<option value="radiant">Radiant</option>
</select>

<label>Diameter / Length (mm)</label>
<input id="length" type="number" step="0.01">

<label>Width (Round માં ખાલી રાખો)</label>
<input id="width" type="number" step="0.01">

<label>Total Depth %</label>
<input id="depth" type="number" step="0.1">

<button onclick="calc()">Calculate</button>

<div class="result" id="result"></div>

</div>

<script>

function calc(){

let shape=document.getElementById("shape").value;

let L=parseFloat(document.getElementById("length").value);

let W=parseFloat(document.getElementById("width").value);

let depth=parseFloat(document.getElementById("depth").value);

if(!L || !depth){

alert("Value enter karo");

return;

}


// IGI CUT

let igi="GOOD";

if(depth>=60 && depth<=62.3)

igi="IDEAL";

else if(depth>=59 && depth<60)

igi="EXCELLENT";

else if(depth>62.3 && depth<=64)

igi="VERY GOOD";


// GIA CUT

let gia="FAIR";

if(depth>=59 && depth<=62.5)

gia="EXCELLENT";

else if(depth>62.5 && depth<=64)

gia="VERY GOOD";

else if(depth>64 && depth<=66)

gia="GOOD";



// ROUND DIAMOND

if(shape=="round"){

let depthMM=L*depth/100;

let points=(L*L*(depthMM*100))/164;

let carat=points/100;


// Spread

let spread="Custom";

if(L>=4.25 && L<=4.35) spread="0.30 ct";

else if(L>=5.05 && L<=5.20) spread="0.50 ct";

else if(L>=6.35 && L<=6.50) spread="1.00 ct";

else if(L>=6.80 && L<=6.95) spread="1.25 ct";

else if(L>=7.30 && L<=7.45) spread="1.50 ct";


document.getElementById("result").innerHTML=

"Weight : "+carat.toFixed(2)+" ct<br>"+

"Spread : "+spread+"<br>"+

"IGI Cut : "+igi+"<br>"+

"GIA Cut : "+gia;

return;

}



// FANCY SHAPES

if(!W){

alert("Width enter karo");

return;

}

let depthMM=L*depth/100;

let k=0;

if(shape=="oval") k=0.0062;

if(shape=="cushion") k=0.0061;

if(shape=="emerald") k=0.0065;

if(shape=="princess") k=0.0059;

if(shape=="pear") k=0.00615;

if(shape=="marquise") k=0.0057;

if(shape=="radiant") k=0.0061;

let weight=L*W*depthMM*k;


// Ratio

let ratio=L/W;


document.getElementById("result").innerHTML=

"Weight : "+weight.toFixed(2)+" ct<br>"+

"Ratio : "+ratio.toFixed(2)+"<br>"+

"IGI Cut : "+igi+"<br>"+

"GIA Cut : "+gia;

}

</script>

</body>
</html>
