<!DOCTYPE html>
<html>
<head>
<title>GIA Advanced Diamond Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
font-family:Arial;
background:#f4f4f4;
padding:15px;
}
.container{
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,0.1);
}
h2{text-align:center;}
input,select,button{
width:100%;
padding:10px;
margin:6px 0;
font-size:16px;
}
button{
background:#000;
color:#fff;
border:none;
border-radius:6px;
}
.result{
margin-top:15px;
font-size:20px;
font-weight:bold;
}
.grade{
font-size:18px;
margin-top:5px;
}
.excellent{color:green;}
.verygood{color:#1a73e8;}
.good{color:#e67e22;}
.fair{color:red;}
</style>
</head>
<body>

<div class="container">
<h2>Diamond Calculator (GIA + IGI Advanced)</h2>

<label>Shape</label>
<select id="shape">
<option value="round">Round</option>
<option value="oval">Oval</option>
<option value="cushion">Cushion</option>
<option value="pear">Pear</option>
<option value="marquise">Marquise</option>
<option value="emerald">Emerald</option>
<option value="princess">Princess</option>
</select>

<label>Min Diameter / Length (mm)</label>
<input type="number" id="min">

<label>Max Diameter / Width (mm)</label>
<input type="number" id="max">

<label>Total Depth (%)</label>
<input type="number" id="depthPercent">

<label>Table (%)</label>
<input type="number" id="table">

<label>Crown Angle (°)</label>
<input type="number" id="crown">

<label>Pavilion Angle (°)</label>
<input type="number" id="pavilion">

<button onclick="calculate()">Calculate</button>

<div class="result" id="result"></div>
<div class="grade" id="cutGrade"></div>

</div>

<script>
function calculate(){

let shape = document.getElementById("shape").value;
let min = parseFloat(document.getElementById("min").value);
let max = parseFloat(document.getElementById("max").value);
let depthPercent = parseFloat(document.getElementById("depthPercent").value);
let table = parseFloat(document.getElementById("table").value);
let crown = parseFloat(document.getElementById("crown").value);
let pavilion = parseFloat(document.getElementById("pavilion").value);

if(!min || !max || !depthPercent || !table || !crown || !pavilion){
document.getElementById("result").innerHTML="Enter all values";
return;
}

let avg = (min + max) / 2;
let depthMM = (avg * depthPercent) / 100;

let constant = 0.0061;
let factor = 1;

if(shape=="oval") factor = 1.00;
if(shape=="cushion") factor = 0.97;
if(shape=="pear") factor = 1.05;
if(shape=="marquise") factor = 1.10;
if(shape=="emerald") factor = 0.95;
if(shape=="princess") factor = 1.00;

let weight;

if(shape=="round"){
weight = avg * avg * depthMM * constant;
}else{
weight = min * max * depthMM * constant * factor;
}

document.getElementById("result").innerHTML =
"Estimated Weight: " + weight.toFixed(2) + " ct";

// Advanced Cut Logic (GIA style approx)

let grade = "";
let className = "";

if(depthPercent >= 59 && depthPercent <= 62.5 &&
table >= 54 && table <= 58 &&
crown >= 34 && crown <= 35 &&
pavilion >= 40.6 && pavilion <= 41){

grade = "Excellent Cut";
className = "excellent";
}
else if(depthPercent <= 63.5 &&
table <= 60 &&
crown >= 33 && crown <= 36 &&
pavilion >= 40.4 && pavilion <= 41.2){

grade = "Very Good Cut";
className = "verygood";
}
else if(depthPercent <= 65){

grade = "Good Cut";
className = "good";
}
else{
grade = "Fair Cut";
className = "fair";
}

let cutElement = document.getElementById("cutGrade");
cutElement.innerHTML = grade;
cutElement.className = "grade " + className;

}
</script>

</body>
</html>
