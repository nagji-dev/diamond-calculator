
<!DOCTYPE html>
<html>
<head>
<title>Nagjibhai Diamond Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
    font-family: Arial;
    background:#f2f2f2;
    text-align:center;
}
.box{
    background:white;
    padding:20px;
    margin:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}
input, select, button{
    width:90%;
    padding:10px;
    margin:10px;
    font-size:16px;
}
button{
    background:green;
    color:white;
    border:none;
    border-radius:5px;
}
</style>
</head>

<body>

<div class="box">
<h2>Diamond Weight Calculator</h2>

<select id="shape">
<option value="Round">Round</option>
<option value="Princess">Princess</option>
<option value="Oval">Oval</option>
<option value="Cushion">Cushion</option>
<option value="Emerald">Emerald</option>
</select>

<select id="lab">
<option value="GIA">GIA Cut</option>
<option value="IGI">IGI Cut</option>
</select>

<input type="number" id="diameter" placeholder="Diameter / Length (mm)">
<input type="number" id="width" placeholder="Width (Fancy only mm)">
<input type="number" id="height" placeholder="Total Height (mm)">

<button onclick="calculateWeight()">Calculate Weight</button>

<h3 id="result">Estimated Weight: 0.000 Carat</h3>

</div>

<script>
function calculateWeight(){

let shape = document.getElementById("shape").value;
let lab = document.getElementById("lab").value;

let dia = parseFloat(document.getElementById("diameter").value) || 0;
let width = parseFloat(document.getElementById("width").value) || dia;
let height = parseFloat(document.getElementById("height").value) || 0;

let weight = 0;
let coeff = 0;

// Lab difference (thodo farak)
if(lab === "GIA"){
    var labFactor = 1.00;
}else{
    var labFactor = 1.03; // IGI thodo heavy estimate
}

if(shape === "Round"){
    coeff = 0.0061;
    weight = dia * dia * height * coeff;
}

else if(shape === "Princess"){
    coeff = 0.0080;
    weight = dia * width * height * coeff;
}

else if(shape === "Oval"){
    coeff = 0.0062;
    weight = dia * width * height * coeff;
}

else if(shape === "Cushion"){
    coeff = 0.0065;
    weight = dia * width * height * coeff;
}

else if(shape === "Emerald"){
    coeff = 0.0090;
    weight = dia * width * height * coeff;
}

weight = weight * labFactor;

document.getElementById("result").innerHTML =
"Estimated Weight: " + weight.toFixed(3) + " Carat";

}
</script>

</body>
</html>
