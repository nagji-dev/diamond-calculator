<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diamond Weight Calculator Pro</title>
<style>
body{
  font-family:Arial;
  background:#f2f2f2;
  padding:20px;
}
.card{
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}
input,select,button{
  width:100%;
  padding:10px;
  margin-top:10px;
  font-size:16px;
}
button{
  background:green;
  color:white;
  border:none;
}
.result{
  margin-top:20px;
  font-size:20px;
  font-weight:bold;
}
</style>
</head>
<body>

<div class="card">
<h2>Diamond Weight Calculator (Pro)</h2>

<select id="shape">
  <option value="round">Round Cut</option>
  <option value="fancy">Fancy All Shape</option>
</select>

<select id="lab">
  <option value="gia">GIA</option>
  <option value="igi">IGI</option>
</select>

<input type="number" id="length" placeholder="Diameter / Length (mm)">
<input type="number" id="width" placeholder="Width (Fancy Only)">
<input type="number" id="depthPercent" placeholder="Total Height %">

<button onclick="calculate()">Calculate Weight</button>

<div class="result" id="result"></div>
</div>

<script>
function calculate(){

let shape=document.getElementById("shape").value;
let lab=document.getElementById("lab").value;

let length=parseFloat(document.getElementById("length").value);
let width=parseFloat(document.getElementById("width").value);
let depthPercent=parseFloat(document.getElementById("depthPercent").value);

if(!length || !depthPercent){
document.getElementById("result").innerText="Fill required fields";
return;
}

let factor=0.0061;   // GIA base

if(lab==="igi"){
factor=0.00615;
}

let weight=0;

if(shape==="round"){

let depthMM=(depthPercent/100)*length;
weight=length*length*depthMM*factor;

}

if(shape==="fancy"){

if(!width){
document.getElementById("result").innerText="Enter Width for Fancy";
return;
}

let depthMM=(depthPercent/100)*length;

/* Fancy correction factor */
let fancyFactor=1.05;   // trade average adjustment

weight=length*width*depthMM*factor*fancyFactor;

}

let cent=weight*100;

document.getElementById("result").innerHTML=
"Carat: "+weight.toFixed(2)+" ct<br>"+
"Cent: "+cent.toFixed(0)+" cent";

}
</script>

</body>
</html>
