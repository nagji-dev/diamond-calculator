<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Diamond Calculator PRO</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
text-align:center;
}

input,select,button{
width:100%;
padding:10px;
margin-top:10px;
font-size:16px;
}

.result{
margin-top:15px;
font-size:18px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h2>Diamond Calculator PRO</h2>

<label>Shape</label>
<select id="shape">
<option value="round">Round</option>
<option value="oval">Oval</option>
<option value="pear">Pear</option>
<option value="marquise">Marquise</option>
<option value="cushion">Cushion</option>
<option value="princess">Princess</option>
</select>

<label>Diameter / Length (mm)</label>
<input id="length" placeholder="Example 5.70">

<label>Width (mm)</label>
<input id="width" placeholder="Round માટે ખાલી રાખો">

<label>Total Depth (%)</label>
<input id="depth" placeholder="Example 62">

<label>Table (%)</label>
<input id="table">

<label>Crown Angle</label>
<input id="crown">

<label>Pavilion Angle</label>
<input id="pavilion">

<button onclick="calculate()">Calculate</button>

<div class="result" id="weight"></div>
<div class="result" id="gia"></div>
<div class="result" id="igi"></div>

</div>

<script>

function calculate(){

let shape=document.getElementById("shape").value;

let L=parseFloat(document.getElementById("length").value);
let W=parseFloat(document.getElementById("width").value);

let depthPercent=parseFloat(document.getElementById("depth").value);

let table=parseFloat(document.getElementById("table").value);
let crown=parseFloat(document.getElementById("crown").value);
let pavilion=parseFloat(document.getElementById("pavilion").value);

if(!L || !depthPercent){
alert("Enter required values");
return;
}

if(!W){
W=L;
}

let depthMM=L*(depthPercent/100);

let carat=0;

if(shape=="round"){
carat=L*L*depthMM*0.0061;
}

if(shape=="oval"){
carat=L*W*depthMM*0.0062;
}

if(shape=="pear"){
carat=L*W*depthMM*0.0061;
}

if(shape=="marquise"){
carat=L*W*depthMM*0.0059;
}

if(shape=="cushion"){
carat=L*W*depthMM*0.0065;
}

if(shape=="princess"){
carat=L*W*depthMM*0.008;
}

document.getElementById("weight").innerHTML =
"Estimated Weight : "+carat.toFixed(2)+" ct";

let gia="Good";

if(
table>=54 && table<=58 &&
depthPercent>=60 && depthPercent<=62.5 &&
crown>=34 && crown<=35 &&
pavilion>=40.6 && pavilion<=41
){
gia="Excellent";
}

else if(
table>=53 && table<=60 &&
depthPercent>=59 && depthPercent<=63.5
){
gia="Very Good";
}

document.getElementById("gia").innerHTML =
"GIA Cut Grade : "+gia;

let igi="Standard";

if(
table>=55 && table<=57 &&
depthPercent>=60 && depthPercent<=62 &&
crown>=34 && crown<=35 &&
pavilion>=40.6 && pavilion<=40.9
){
igi="IGI IDEAL";
}

else if(
table>=54 && table<=58 &&
depthPercent>=59 && depthPercent<=63
){
igi="IGI EXCELLENT";
}

document.getElementById("igi").innerHTML =
"IGI Result : "+igi;

}

</script>

</body>
</html>
