<script>
function calculateWeight() {

    let shape = document.getElementById("shape").value;
    let length = parseFloat(document.getElementById("length").value);
    let width = parseFloat(document.getElementById("width").value);
    let depthPercent = parseFloat(document.getElementById("depth").value);

    if (!length || !width || !depthPercent) {
        document.getElementById("result").innerText = "Please enter all values";
        return;
    }

    let carat = 0;

    // ROUND
    if (shape === "Round") {
        let depthMM = length * (depthPercent / 100);
        carat = length * length * depthMM * 0.0061;
    }

    // FANCY SHAPES
    else {

        let shapeFactor = 0.0062; // default

        if (shape === "Oval") shapeFactor = 0.0062;
        if (shape === "Cushion") shapeFactor = 0.0061;
        if (shape === "Princess") shapeFactor = 0.0061;
        if (shape === "Emerald") shapeFactor = 0.0065;
        if (shape === "Pear") shapeFactor = 0.00615;
        if (shape === "Marquise") shapeFactor = 0.0059;
        if (shape === "Radiant") shapeFactor = 0.00615;
        if (shape === "Heart") shapeFactor = 0.0060;

        let depthMM = length * (depthPercent / 100);
        carat = length * width * depthMM * shapeFactor;
    }

    document.getElementById("result").innerText =
        "Estimated Weight: " + carat.toFixed(2) + " Carat";
}
</script>
