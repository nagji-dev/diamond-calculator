<!DOCTYPE html><html>
<head>
<title>Diamond Calculator Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1"><style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
padding:15px;
}

.box{
background:white;
max-width:430px;
margin:auto;
padding:20px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.logo{
width:70px;
display:block;
margin:auto;
}

h2{
text-align:center;
margin-bottom:20px;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

label{
font-size:14px;
}

input,select{
width:170px;
padding:10px;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#007bff;
color:white;
border:none;
border-radius:6px;
font-size:16px;
}

.result{
text-align:center;
font-size:18px;
margin-top:15px;
font-weight:bold;
}

</style></head><body><div class="box"><h2>Diamond Calculator Pro</h2><div class="row">
<label>Length</label>
<input type="number" id="length">
</div><div class="row">
<label>Width</label>
<input type="number" id="width">
</div><div class="row">
<label>Depth</label>
<input type="number" id="depth">
</div><button onclick="calc()">Calculate Weight</button>

<div class="result" id="result">Weight: 0</div></div><script>

function calc(){

var l=document.getElementById("length").value;
var w=document.getElementById("width").value;
var d=document.getElementById("depth").value;

var weight=(l*w*d*0.0061).toFixed(2);

document.getElementById("result").innerHTML="Weight: "+weight+" ct";

}

</script></body>
</html>
