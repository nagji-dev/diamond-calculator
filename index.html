<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Diamond Calculator</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
display:flex;
justify-content:center;
padding-top:40px;
}

.box{
background:white;
padding:20px;
width:320px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
}

input,select,button{
width:100%;
padding:10px;
margin-top:10px;
font-size:16px;
}

button{
background:#1976d2;
color:white;
border:none;
}

.result{
margin-top:15px;
font-size:18px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="box">

<h2>Diamond Calculator</h2>

<select id="shape">
<option value="round">Round</option>
<option value="oval">Oval</option>
<option value="pear">Pear</option>
<option value="marquise">Marquise</option>
<option value="cushion">Cushion</option>
<option value="emerald">Emerald</option>
</select>

<input id="l" placeholder="Length / Diameter (mm)">
<input id="w" placeholder="Width (mm)">
<input id="d" placeholder="Total Depth %">

<button onclick="calc()">Calculate</button>

<div class="result" id="weight"></div>
<div class="result" id="ratio"></div>
<div class="result" id="cut"></div>

</div>

<script>

function calc(){

let shape=document.getElementById("shape").value

let l=parseFloat(document.getElementById("l").value)
let w=parseFloat(document.getElementById("w").value)
let d=parseFloat(document.getElementById("d").value)/100

let weight=0

if(shape=="round"){
weight=l*l*d*0.0061
}

if(shape=="oval"){
weight=l*w*w*d*0.00605
}

if(shape=="pear"){
weight=l*w*w*d*0.006
}

if(shape=="marquise"){
weight=l*w*w*d*0.0059
}

if(shape=="cushion"){
weight=l*w*w*d*0.0061
}

if(shape=="emerald"){
weight=l*w*w*d*0.0062
}

weight=weight.toFixed(2)

document.getElementById("weight").innerHTML="Estimated Weight : "+weight+" ct"

let ratio=(l/w).toFixed(2)

document.getElementById("ratio").innerHTML="Ratio : "+ratio

let cut="GOOD"

if(d>=0.59 && d<=0.62){
cut="EXCELLENT"
}

else if(d>=0.57 && d<=0.64){
cut="VERY GOOD"
}

document.getElementById("cut").innerHTML="Cut : "+cut

}

</script>

</body>
</html>
