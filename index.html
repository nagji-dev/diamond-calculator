<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIA + IGI Diamond Calculator</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f2f2f2;
    text-align: center;
    padding: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    max-width: 400px;
    margin: auto;
}

input, select {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
    font-size: 16px;
    cursor: pointer;
}

.calculate {
    background: #1976d2;
    color: white;
}

.share {
    background: #00c853;
    color: white;
}

.result-box {
    margin-top: 15px;
    font-size: 18px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="card">
<h2>GIA + IGI Diamond Calculator</h2>

<select id="shape">
<option value="Round">Round</option>
<option value="Oval">Oval</option>
<option value="Emerald">Emerald</option>
<option value="Pear">Pear</option>
<option value="Marquise">Marquise</option>
<option value="Cushion">Cushion</option>
</select>

<input type="number" id="diameter" placeholder="Diameter (mm)">
<input type="number" id="length" placeholder="Length (mm)" style="display:none;">
<input type="number" id="width" placeholder="Width (mm)" style="display:none;">
<input type="number" id="depth" placeholder="Depth %">

<button class="calculate" onclick="calculateDiamond()">Calculate</button>
<button class="share" onclick="shareResult()">Share Result</button>

<div id="result" class="result-box"></div>
</div>

<script>
let finalText = "";

document.getElementById("shape").addEventListener("change", function () {
    if (this.value === "Round") {
        diameter.style.display = "block";
        length.style.display = "none";
        width.style.display = "none";
    } else {
        diameter.style.display = "none";
        length.style.display = "block";
        width.style.display = "block";
    }
});

function calculateDiamond() {

    let shape = shape.value;
    let dia = parseFloat(diameter.value);
    let len = parseFloat(length.value);
    let wid = parseFloat(width.value);
    let depthPercent = parseFloat(depth.value);

    let weight = 0;
    let cut = "";

    if (shape === "Round") {

        if (!dia || !depthPercent) {
            alert("Enter Diameter and Depth%");
            return;
        }

        let depthMM = (dia * depthPercent) / 100;
        weight = dia * dia * depthMM * 0.0061;

        if (depthPercent >= 59 && depthPercent <= 62.5) cut = "Excellent";
        else if (depthPercent <= 64) cut = "Very Good";
        else if (depthPercent <= 66) cut = "Good";
        else cut = "Fair";

    } else {

        if (!len || !wid || !depthPercent) {
            alert("Enter Length, Width and Depth%");
            return;
        }

        let avg = (len + wid) / 2;
        let depthMM = (avg * depthPercent) / 100;

        let factor = 0.0061;
        if (shape === "Oval") factor = 0.0062;
        if (shape === "Emerald") factor = 0.0065;
        if (shape === "Pear") factor = 0.00615;
        if (shape === "Marquise") factor = 0.0059;

        weight = len * wid * depthMM * factor;
        cut = "Fancy Cut";
    }

    finalText = 
        "Shape: " + shape + "\n" +
        "Weight: " + weight.toFixed(2) + " ct\n" +
        "Cut Grade: " + cut;

    result.innerHTML = finalText.replace(/\n/g,"<br>");
}

function shareResult() {
    if (!finalText) {
        alert("Calculate first!");
        return;
    }

    if (navigator.share) {
        navigator.share({
            title: "Diamond Result",
            text: finalText
        });
    } else {
        alert("Sharing not supported in this browser");
    }
}
</script>

</body>
</html>
