<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Diamond Weight Calculator</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
text-align:center;
padding:40px;
}

.container{
background:white;
padding:30px;
border-radius:10px;
width:320px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input,select{
width:100%;
padding:10px;
margin:8px 0;
font-size:16px;
}

button{
background:#007bff;
color:white;
border:none;
padding:10px;
width:100%;
font-size:18px;
cursor:pointer;
}

.result{
margin-top:20px;
font-size:22px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h2>Diamond Calculator</h2>

<select id="shape">
<option value="round">Round</option>
<option value="oval">Oval</option>
</select>

<input id="length" placeholder="Length (mm)">
<input id="width" placeholder="Width / Diameter (mm)">
<input id="depth" placeholder="Depth %">

<button onclick="calculate()">Calculate</button>

<div class="result" id="result"></div>

</div>

<script>

function calculate(){

let shape=document.getElementById("shape").value;

let length=parseFloat(document.getElementById("length").value);

let width=parseFloat(document.getElementById("width").value);

let depth=parseFloat(document.getElementById("depth").value);

let weight=0;

if(shape=="round"){

let depthMM=width*(depth/100);

weight=width*width*depthMM*0.0061;

}

if(shape=="oval"){

let depthMM=width*(depth/100);

weight=length*width*depthMM*0.0067;

}

document.getElementById("result").innerHTML=
"Estimated Weight : "+weight.toFixed(2)+" ct";

}

</script>

</body>
</html>
