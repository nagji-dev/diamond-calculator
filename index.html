<!DOCTYPE html>
<html>
<head>
<title>Diamond Calculator</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
}

.box{
background:white;
padding:25px;
width:340px;
margin:auto;
margin-top:40px;
border-radius:12px;
box-shadow:0 0 12px rgba(0,0,0,0.2);
}

input,select,button{
width:90%;
padding:10px;
margin:8px;
font-size:16px;
}

button{
background:#007bff;
color:white;
border:none;
cursor:pointer;
border-radius:6px;
}

.result{
margin-top:15px;
font-size:18px;
}

</style>
</head>

<body>

<div class="box">

<h2>Diamond Calculator</h2>

<select id="shape">

<option value="round">Round</option>
<option value="oval">Oval</option>
<option value="cushion">Cushion</option>
<option value="emerald">Emerald</option>
<option value="pear">Pear</option>
<option value="marquise">Marquise</option>

</select>

<input id="length" placeholder="Length (mm)">

<input id="width" placeholder="Width (mm)">

<input id="depth" placeholder="Depth %">

<button onclick="calc()">Calculate</button>

<div class="result" id="result"></div>

</div>

<script>

function calc(){

let shape=document.getElementById("shape").value;

let L=parseFloat(document.getElementById("length").value);

let W=parseFloat(document.getElementById("width").value);

let depthPercent=parseFloat(document.getElementById("depth").value);

let factor=0.0061;

if(shape=="oval")factor=0.00655;
if(shape=="cushion")factor=0.00645;
if(shape=="emerald")factor=0.0066;
if(shape=="pear")factor=0.0065;
if(shape=="marquise")factor=0.0062;

let avg=(L+W)/2;

let depth=(depthPercent/100)*avg;

let weight=(L*W*depth*factor).toFixed(2);

let ratio=(L/W).toFixed(2);

let cut="Fair";

if(depthPercent>=58 && depthPercent<=62)
cut="Excellent";
else if(depthPercent>62 && depthPercent<=65)
cut="Very Good";
else if(depthPercent>65 && depthPercent<=69)
cut="Good";

document.getElementById("result").innerHTML=

"Weight : "+weight+" ct <br>"+
"Ratio : "+ratio+" <br>"+
"Depth : "+depthPercent+" % <br>"+
"Cut : "+cut;

}

</script>

</body>
</html>
