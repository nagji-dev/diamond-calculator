<!DOCTYPE html>
<html>
<head>

<title>Diamond Calculator</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
padding:15px;
}

.box{
background:white;
max-width:420px;
margin:auto;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
text-align:center;
}

.row{
display:flex;
justify-content:space-between;
margin-top:12px;
align-items:center;
}

input,select{
width:160px;
padding:10px;
font-size:16px;
}

button{
width:100%;
padding:14px;
margin-top:18px;
font-size:18px;
background:#1976d2;
color:white;
border:none;
}

.result{
margin-top:14px;
font-size:19px;
font-weight:bold;
text-align:center;
}

</style>
</head>

<body>

<div class="box">

<h2>Diamond Calculator</h2>

<div class="row">
<label>Shape</label>
<select id="shape">
<option value="round">Round</option>
<option value="oval">Oval</option>
<option value="pear">Pear</option>
<option value="marquise">Marquise</option>
<option value="cushion">Cushion</option>
<option value="emerald">Emerald</option>
<option value="princess">Princess</option>
</select>
</div>

<div class="row">
<label>Mode</label>
<select id="mode" onchange="modeChange()">
<option value="normal">Normal</option>
<option value="helium">Helium</option>
</select>
</div>

<div class="row">
<label>Length / Diameter</label>
<input type="number" id="l">
</div>

<div class="row">
<label>Width</label>
<input type="number" id="w">
</div>

<div class="row" id="depthRow">
<label>Total Depth %</label>
<input type="number" id="depth">
</div>

<div class="row" id="heightRow" style="display:none;">
<label>Height (mm)</label>
<input type="number" id="height">
</div>

<button onclick="calculate()">Calculate</button>

<div class="result" id="weight"></div>
<div class="result" id="ratio"></div>
<div class="result" id="guide"></div>

</div>

<script>

function modeChange(){

let mode=document.getElementById("mode").value;

if(mode=="helium"){
document.getElementById("depthRow").style.display="none";
document.getElementById("heightRow").style.display="flex";
}else{
document.getElementById("depthRow").style.display="flex";
document.getElementById("heightRow").style.display="none";
}

}

function calculate(){

let shape=document.getElementById("shape").value;

let L=parseFloat(document.getElementById("l").value);
let W=parseFloat(document.getElementById("w").value);

let avg=(L+W)/2;

let height;

if(document.getElementById("mode").value=="helium"){

height=parseFloat(document.getElementById("height").value);

}else{

let depth=parseFloat(document.getElementById("depth").value);

if(shape=="round"){
height=avg*(depth/100);
}else{
height=W*(depth/100);
}

}

let constant=0;

if(shape=="round") constant=0.00615;
if(shape=="oval") constant=0.00625;
if(shape=="pear") constant=0.00605;
if(shape=="marquise") constant=0.0057;
if(shape=="cushion") constant=0.0061;
if(shape=="emerald") constant=0.0063;
if(shape=="princess") constant=0.0061;

let weight;

if(shape=="round"){
weight=avg*avg*height*constant;
}else{
weight=L*W*height*constant;
}

let ratio=(L/W).toFixed(2);

document.getElementById("weight").innerHTML="Weight : "+weight.toFixed(2)+" ct";

document.getElementById("ratio").innerHTML="Ratio : "+ratio;

let guide="";

if(shape=="oval") guide="Best Ratio 1.30 – 1.45";
if(shape=="pear") guide="Best Ratio 1.45 – 1.60";
if(shape=="marquise") guide="Best Ratio 1.75 – 2.20";
if(shape=="emerald") guide="Best Ratio 1.30 – 1.50";
if(shape=="cushion") guide="Best Ratio 1.00 – 1.20";
if(shape=="princess") guide="Best Ratio 1.00 – 1.05";

document.getElementById("guide").innerHTML=guide;

}

</script>

</body>
</html>
