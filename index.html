<!DOCTYPE html>
<html>
<head>
<title>Diamond Calculator</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
}

.box{
background:white;
padding:20px;
margin:40px auto;
width:330px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:10px;
margin:8px 0;
font-size:16px;
}

button{
width:100%;
padding:12px;
background:#1976d2;
color:white;
border:none;
font-size:16px;
border-radius:5px;
}

.result{
margin-top:15px;
font-size:18px;
}

</style>
</head>

<body>

<div class="box">

<h2>Diamond Calculator</h2>

<select id="shape">
<option value="round">Round</option>
<option value="oval">Oval</option>
<option value="pear">Pear</option>
<option value="cushion">Cushion</option>
<option value="emerald">Emerald</option>
<option value="marquise">Marquise</option>
<option value="heart">Heart</option>
</select>

<input type="number" id="length" placeholder="Length">

<input type="number" id="width" placeholder="Width / Diameter">

<input type="number" id="depth" placeholder="Depth %">

<button onclick="calculate()">Calculate</button>

<div class="result" id="result"></div>

</div>

<script>

function calculate(){

let shape=document.getElementById("shape").value;
let L=parseFloat(document.getElementById("length").value);
let W=parseFloat(document.getElementById("width").value);
let D=parseFloat(document.getElementById("depth").value);

let weight=0;

if(shape=="round"){
weight = W * W * D * 0.0061;
}

if(shape=="oval"){
weight = L * W * W * D * 0.0065 / 100;
}

if(shape=="pear"){
weight = L * W * W * D * 0.0062 / 100;
}

if(shape=="cushion"){
weight = L * W * W * D * 0.0064 / 100;
}

if(shape=="emerald"){
weight = L * W * W * D * 0.0060 / 100;
}

if(shape=="marquise"){
weight = L * W * W * D * 0.0061 / 100;
}

if(shape=="heart"){
weight = L * W * W * D * 0.0062 / 100;
}

weight = weight.toFixed(2);

let ratio=(L/W).toFixed(2);

let cut="Good";

if(D>=59 && D<=62){
cut="Excellent";
}
else if(D>=57 && D<=64){
cut="Very Good";
}

document.getElementById("result").innerHTML=
"Weight : "+weight+" ct<br>"+
"Ratio : "+ratio+"<br>"+
"Depth : "+D+" %<br>"+
"Cut : "+cut;

}

</script>

</body>
</html>
